{
  "openapi": "3.0.3",
  "info": {
    "title": "Product Catalogue API",
    "description": "API for managing payment products and their configurations",
    "version": "1.0.0"
  },
  "servers": [
    {
      "url": "https://api.example.com/v1",
      "description": "Production server"
    }
  ],
  "paths": {
    "/products": {
      "get": {
        "summary": "Get all products",
        "description": "Retrieves a list of all available payment products",
        "operationId": "getProducts",
        "responses": {
          "200": {
            "description": "Successful response",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/Product"
                  }
                }
              }
            }
          }
        }
      },
      "post": {
        "summary": "Create a new product",
        "description": "Adds a new payment product to the catalogue",
        "operationId": "createProduct",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/Product"
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Product created successfully",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Product"
                }
              }
            }
          }
        }
      }
    },
    "/products/{productId}": {
      "get": {
        "summary": "Get a product by ID",
        "description": "Retrieves a specific product by its identifier",
        "operationId": "getProductById",
        "parameters": [
          {
            "name": "productId",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Successful response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Product"
                }
              }
            }
          },
          "404": {
            "description": "Product not found"
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "Product": {
        "type": "object",
        "required": [
          "product_id",
          "name",
          "product_type",
          "status"
        ],
        "properties": {
          "product_id": {
            "type": "string",
            "description": "Unique identifier for the product"
          },
          "name": {
            "type": "string",
            "description": "Display name of the product"
          },
          "product_type": {
            "type": "string",
            "description": "Category of the product"
          },
          "description": {
            "type": "string",
            "description": "Detailed description of the product"
          },
          "version": {
            "type": "string",
            "description": "Current version of the product"
          },
          "status": {
            "type": "string",
            "enum": ["active", "inactive", "deprecated"],
            "description": "Current status of the product"
          },
          "features": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/Feature"
            },
            "description": "List of features associated with the product"
          },
          "compliance_and_documents": {
            "$ref": "#/components/schemas/ComplianceAndDocuments"
          },
          "product_configuration": {
            "$ref": "#/components/schemas/ProductConfiguration"
          }
        }
      },
      "Feature": {
        "type": "object",
        "required": [
          "feature_id",
          "name"
        ],
        "properties": {
          "feature_id": {
            "type": "string",
            "description": "Unique identifier for the feature"
          },
          "name": {
            "type": "string",
            "description": "Display name of the feature"
          },
          "description": {
            "type": "string",
            "description": "Detailed description of the feature"
          },
          "enabled_by_default": {
            "type": "boolean",
            "description": "Whether the feature is enabled by default"
          },
          "required": {
            "type": "boolean",
            "description": "Whether the feature is required"
          },
          "category": {
            "type": "string",
            "description": "Category of the feature"
          }
        }
      },
      "ComplianceAndDocuments": {
        "type": "object",
        "properties": {
          "risk_level": {
            "type": "string",
            "description": "Risk level classification"
          },
          "cdd_required": {
            "type": "boolean",
            "description": "Whether Customer Due Diligence is required"
          },
          "documents": {
            "type": "array",
            "items": {
              "type": "string"
            },
            "description": "List of required documents"
          }
        }
      },
      "ProductConfiguration": {
        "type": "object",
        "properties": {
          "schema": {
            "$ref": "#/components/schemas/ProductConfigurationSchema"
          }
        }
      },
      "ProductConfigurationSchema": {
        "type": "object",
        "properties": {
          "enable_recurring": {
            "type": "boolean",
            "description": "Whether to enable recurring billing features"
          },
          "default_currency": {
            "type": "string",
            "description": "Default currency for transactions (ISO 4217 code)",
            "readOnly": true
          },
          "default_payment_methods": {
            "type": "array",
            "items": {
              "type": "string",
              "enum": ["visa", "mastercard"]
            },
            "minItems": 2,
            "maxItems": 2,
            "uniqueItems": true,
            "readOnly": true,
            "description": "Fixed default payment methods for this product"
          },
          "per_transaction_min_pence": {
            "type": "integer",
            "minimum": 1,
            "description": "Minimum allowed transaction amount in cents",
            "readOnly": true
          },
          "per_transaction_max_pence": {
            "type": "integer",
            "minimum": 1000000,
            "description": "Maximum allowed transaction amount in cents",
            "readOnly": true
          },
          "payment_methods": {
            "type": "array",
            "items": {
              "type": "string",
              "enum": ["amex", "open_banking", "paypal"]
            },
            "description": "List of allowed payment method types"
          }
        }
      }
    }
  }
}